<div class="min-h-screen bg-gray-50 font-sans flex flex-col">
    <!-- Navigation header -->
    <header class="bg-gray-900 text-white shadow-md z-10 sticky top-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center">
                    <!-- Logo / Brand -->
                    <div class="flex-shrink-0 flex items-center gap-2" routerLink="/driver"
                        class="cursor-pointer flex items-center gap-2">
                        <svg class="h-8 w-8 text-yellow-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                        </svg>
                        <span class="font-bold text-xl tracking-tight hidden sm:block">TMS <span
                                class="text-yellow-500 font-light">Driver</span></span>
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <div class="flex flex-col items-end">
                        <span class="text-sm font-medium">{{ userName | titlecase }}</span>
                        <span class="text-xs text-yellow-400 font-mono">Driver</span>
                    </div>
                    <button (click)="logout()"
                        class="ml-4 bg-gray-800 border border-gray-700 hover:bg-gray-700 text-white px-3 py-1.5 rounded text-sm font-medium transition-colors">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main content area -->
    <div class="flex-grow flex flex-col max-w-7xl mx-auto w-full">
        <!-- Sub-navigation / Welcome -->
        <div class="bg-white border-b border-gray-200 px-4 sm:px-6 lg:px-8 py-5">
            <h1 class="text-2xl font-bold text-gray-900">Welcome back, {{ userName | titlecase }}!</h1>
            <p class="mt-1 text-sm text-gray-500">View your assigned shipments and update their delivery status.</p>
        </div>

        <!-- Router outlet block for trips -->
        <div class="flex-grow pt-6 pb-12 px-2 sm:px-6 lg:px-8">
            <router-outlet></router-outlet>
        </div>
    </div>
</div>
